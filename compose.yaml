# Homelab stack. See SPEC.md for what each service is and why.
#
# Deploy loop (from the box, over Tailscale SSH):
#   git pull && docker compose up -d
#
# Secrets/config not in git:
#   .env                        — copy from .env.example, fill in
#   cloudflared/<tunnel-id>.json — created by `cloudflared tunnel create`
#                                  (see docs/tunnel-setup.md), gitignored

name: homelab

services:
  # The tunnel. Egress-only; opens no inbound ports. Locally-managed —
  # routes live in ./cloudflared/config.yml (git-tracked), creds JSON is
  # human-supplied and gitignored. At migration time config.yml has no real
  # ingress routes (everything is Tailscale-private). See SPEC.md §Access planes.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      # Mounts both config.yml and the creds JSON (read-only).
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - homelab_net

  # Docker registry. Tailscale-private, plain HTTP, published on host port
  # 30500. NEVER behind Cloudflare Access — that breaks `docker push`
  # (Docker auth can't do OAuth redirects). See SPEC.md.
  # Addressed everywhere as ${REGISTRY_HOST} (i.e. <tailscale-ip>:30500),
  # not by this service name.
  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    ports:
      # Bound to the Tailscale IP only — NOT 0.0.0.0 — so the box's home-LAN
      # interface can't reach this unauthenticated HTTP registry. Needs
      # tailscale0 up before start; restart policy retries if it isn't.
      - "${TAILSCALE_IP}:30500:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - homelab_net

  # Home Assistant. host networking is REQUIRED for mDNS/SSDP device
  # discovery (same reason it was hostNetwork under k3s). Consequence: it is
  # NOT on homelab_net and can't resolve other services by compose DNS — this
  # is expected. Reach it at <tailscale-ip>:8123. Do NOT move it onto the
  # bridge to "fix" this; that breaks discovery. See SPEC.md.
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ}
    volumes:
      - ha_data:/config

  # duri — the human's couples-finance app (Next.js). Runs as a stateless
  # artifact per SPEC Pattern A: built on a dev machine, pushed to the registry,
  # pulled here. Its DB/auth/realtime/storage live in Supabase cloud, NOT on this
  # box — so no volume. Tailscale-private (no cloudflared ingress); both partners
  # reach it over Tailscale at https://<box>.<magicdns> (tailscale serve). See
  # SPEC.md §Services and scripts/serve-duri.sh.
  #
  # The deployed version is PINNED INLINE here (git SHA, never :latest), like
  # every other service — the tag lives in git, so `git blame`/`git revert` are
  # the deploy log and rollback. The `scripts/deploy-duri.sh` one-command deploy
  # bumps this line, pushes, and reconciles the box. Bring up only after the
  # image exists (the script builds+pushes first). See SPEC.md §Deploy.
  duri:
    image: ${REGISTRY_HOST}/duri:b6dbb8c   # bumped by scripts/deploy-duri.sh — never :latest
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    # Server-only app secrets (Supabase service-role key, DATABASE_URL, Anthropic
    # key) — gitignored, kept OUT of the shared .env. The NEXT_PUBLIC_* Supabase
    # URL + anon key are baked into the image at build time, not set here.
    env_file:
      - duri.env
    ports:
      # Bound to loopback only. The sole tailnet-facing door is HTTPS via
      # `tailscale serve` (scripts/serve-duri.sh), which terminates TLS on the box
      # and proxies to this port. duri needs a SECURE CONTEXT (HTTPS) for its PWA
      # service worker + Web Crypto (crypto.randomUUID) — plain HTTP on the
      # Tailscale IP is not a secure context, so we no longer publish there.
      - "127.0.0.1:3000:3000"
    networks:
      - homelab_net

networks:
  homelab_net:
    driver: bridge

volumes:
  registry_data:
  ha_data:
