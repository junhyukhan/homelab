apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-tunnel-deployment
  labels:
    app: cloudflared-tunnel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      # This label links the deployment to its pods
      app: cloudflared-tunnel
  template:
    metadata:
      labels:
        # The label for the pod itself
        app: cloudflared-tunnel
    spec:
      hostNetwork: true
      containers:
      - name: cloudflared-container
        # The container image to use
        image: cloudflare/cloudflared:latest
        # This is where we construct your original command
        command: ["cloudflared"]
        args:
        - "tunnel"
        - "--no-autoupdate"
        - "--metrics"
        - "0.0.0.0:2000"
        - "run"
        - "--token"
        - "$(TUNNEL_TOKEN)"
        ports:
        - name: metrics
          containerPort: 2000
          protocol: TCP
        # This is the crucial part: it securely loads the token from the secret
        env:
          - name: TUNNEL_TOKEN
            valueFrom:
              secretKeyRef:
                # The name of the secret we created in Step 1
                name: cloudflare-tunnel-token
                # The key within that secret that holds the value
                key: TUNNEL_TOKEN
